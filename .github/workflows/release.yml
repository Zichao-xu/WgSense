name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-alpha)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build macOS app
        working-directory: platforms/macos
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild -project WgSense.xcodeproj -scheme WgSense \
            -configuration Release build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath build

      - name: Verify app bundle
        run: |
          app="platforms/macos/build/Build/Products/Release/WgSense.app"
          test -x "$app/Contents/Resources/libexec/wgsense-daemon"
          test -x "$app/Contents/Resources/packaging/wgsense-install-services.sh"
          test -x "$app/Contents/Resources/packaging/wgsense-uninstall-services.sh"
          test -f "$app/Contents/Resources/AppIcon.icns"
          plutil -lint "$app/Contents/Info.plist"
          codesign --verify --deep --strict "$app"

      - name: Create install DMG
        run: |
          brew install create-dmg
          chmod +x packaging/create-dmg.sh
          packaging/create-dmg.sh \
            platforms/macos/build/Build/Products/Release/WgSense.app \
            WgSense-macOS.dmg
          shasum -a 256 WgSense-macOS.dmg > SHA256SUMS.txt

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WgSense-macOS
          path: |
            WgSense-macOS.dmg
            SHA256SUMS.txt

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: WgSense-macOS
          path: artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: WgSense ${{ steps.tag.outputs.tag }}
          body: |
            ## WgSense ${{ steps.tag.outputs.tag }}

            ### 安装

            1. 下载并打开 `WgSense-macOS.dmg`
            2. 将 `WgSense.app` 拖入 `Applications`
            3. 启动 WgSense；需要系统 helper 时由 App 内的维护面板安装

            > 此构建使用临时签名且尚未公证。首次启动可能需要在“系统设置 → 隐私与安全性”中确认打开。

            ### 注意

            - 请确保已备份现有 WG 配置
            - 测试期间如断网，恢复 DNS：`sudo networksetup -setdnsservers Wi-Fi empty`
          files: |
            artifacts/WgSense-macOS.dmg
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: true

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-alpha)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Go daemon
        working-directory: core
        run: |
          go build -o wgsense-daemon ./cmd/wgsense-daemon/
          chmod +x wgsense-daemon
          tar czf wgsense-daemon-darwin-amd64.tar.gz wgsense-daemon

      - name: Build macOS app
        working-directory: platforms/macos
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild -project WgSense.xcodeproj -scheme WgSense \
            -configuration Release build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath build
          cd build/Build/Products/Release
          zip -r WgSense-macOS.zip WgSense.app

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgsense-daemon-darwin
          path: core/wgsense-daemon-darwin-amd64.tar.gz

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WgSense-macOS
          path: platforms/macos/build/Build/Products/Release/WgSense-macOS.zip

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wgsense-daemon-darwin
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: WgSense-macOS
          path: artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: WgSense ${{ steps.tag.outputs.tag }}
          body: |
            ## WgSense ${{ steps.tag.outputs.tag }}

            ### 安装

            1. 下载 `WgSense-macOS.zip`，解压后拖入 `/Applications`
            2. 下载 `wgsense-daemon-darwin-amd64.tar.gz`，解压
            3. 用 sudo 运行 daemon：`sudo ./wgsense-daemon`
            4. 启动 WgSense.app

            > alpha 阶段：daemon 需 sudo 创建 TUN，NetworkExtension 尚未实现。

            ### 注意

            - 请确保已备份现有 WG 配置
            - 测试期间如断网，恢复 DNS：`sudo networksetup -setdnsservers Wi-Fi empty`
          files: |
            artifacts/wgsense-daemon-darwin-amd64.tar.gz
            artifacts/WgSense-macOS.zip
          draft: false
          prerelease: true

name: WgSense
options:
  bundleIdPrefix: com.wgsense
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""

targets:
  WgSense:
    type: application
    platform: macOS
    sources:
      - path: WgSense
    preBuildScripts:
      - name: Build Bundled Daemon
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          core_dir="$SRCROOT/../../core"
          packaging_dir="$SRCROOT/../../packaging"
          out_dir="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/libexec"
          packaging_out="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/packaging"
          mkdir -p "$out_dir" "$packaging_out"
          (cd "$core_dir" && /usr/bin/env go build -trimpath -o "$out_dir/wgsense-daemon" ./cmd/wgsense-daemon)
          chmod 0755 "$out_dir/wgsense-daemon"
          install -m 0755 "$packaging_dir/wgsense-install-services.sh" "$packaging_out/wgsense-install-services.sh"
          install -m 0755 "$packaging_dir/wgsense-uninstall-services.sh" "$packaging_out/wgsense-uninstall-services.sh"
          install -m 0755 "$packaging_dir/wgsense-receive-mover.sh" "$packaging_out/wgsense-receive-mover.sh"
          install -m 0644 "$packaging_dir/com.wgsense.daemon.plist.template" "$packaging_out/com.wgsense.daemon.plist.template"
          install -m 0644 "$packaging_dir/com.wgsense.receive-mover.plist.template" "$packaging_out/com.wgsense.receive-mover.plist.template"
    dependencies:
      - target: WgSenseWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wgsense.macos
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: WgSense
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  WgSenseWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: WgSenseWidget
      - path: WgSense/Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wgsense.macos.widget
        PRODUCT_NAME: WgSenseWidget
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: WgSenseWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
